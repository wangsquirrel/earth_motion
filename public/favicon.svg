<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- subtle light-blue wash over deep night -->
  <rect width="64" height="64" rx="14" fill="#2f4fa7"/>
  <rect width="64" height="64" rx="14" fill="#60a5fa" opacity="0.10"/>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round" stroke-width="4">
    <!-- sky dome: extra large true semicircle (fills more of the square) -->
    <path d="M6 47A26 26 0 0 1 58 47" stroke="#60A5FA"/>
    <!-- horizon (diameter) -->
    <path d="M6 47H58" stroke="#60A5FA"/>

    <!-- ecliptic: pulled inward to keep a visible gap from the dome -->
    <path d="M20 45 C28 23 43 22 44 24" stroke="#F59E0B"/>
  </g>

  <!-- sun on the ecliptic -->
  <circle cx="24" cy="31" r="3.8" fill="#F59E0B"/>
</svg>
